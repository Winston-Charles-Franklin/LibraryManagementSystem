{% extends "base.html" %}

{% block title %} 个人中心 {% endblock %}

{% block content %}
<div class="profile-container">
    <div class="profile-header">
        <h1>我的档案</h1>
    </div>
    <div class="profile-body">

        <form method="post" action="{{ url_for('user_profile') }}">

            <div class="info-group">
                <div class="info-label">借书证号</div>
                <div class="info-field">
                    <input type="text" name="card_number" value="{{ user.card_number }}" readonly>
                    <div class="help-note">* </div>
                </div>
            </div>

            <div class="info-group">
                <div class="info-label">姓名</div>
                <div class="info-field">
                    <input type="text" name="name" value="{{ user.name }}" readonly>
                </div>
            </div>

            <div class="info-group">
                <div class="info-label">用户角色</div>
                <div class="info-field">
                    <div class="readonly-text">
                        {% if user.is_admin %}管理员{% else %}普通读者{% endif %}
                    </div>
                </div>
            </div>

            <div class="info-group">
                <div class="info-label">手机号码</div>
                <div class="info-field">
                    <input type="tel" name="phone" value="{{ user.phone }}" pattern="1[3-9]\d{9}" placeholder="11位手机号">
                </div>
            </div>

            <div class="info-group">
                <div class="info-label">注册时间</div>
                <div class="info-field">
                    <input type="text" name="name" value="{{ user.reg_time }}" readonly>
                </div>
            </div>

            <div class="info-group">
                <div class="info-label">密码</div>
                <div class="info-field">
                    <input type="password" name="password" placeholder="新密码">
                    <div class="help-note">* 请输入新密码（至少6位）</div>
                </div>
            </div>

            <hr>

            <div class="btn-group">
                <button type="submit" class="btn btn-primary">保存修改</button>
                <button type="button" class="btn btn-secondary" onclick="history.back()">返回首页</button>
            </div>
        </form>
    </div>
    <script>
        {% for message in get_flashed_messages() %}
            alert({{ message|tojson }});
        {% endfor %}
    </script>
</div>
{% endblock %}
