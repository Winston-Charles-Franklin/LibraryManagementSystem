<!DOCTYPE html>
<html lang="en" xmlns="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <style>

       * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url("static/images/fuzhong1.JPG") no-repeat center center fixed;
            background-size: cover;
            opacity: 1;
            z-index: -1;
        }


        .login-card {
            background: rgba(255, 255, 255, 0.3);
            backdrop-filter: blur(10px);
            border-radius: 12px;
            padding: 2rem 2rem 2.5rem;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 25px 45px rgba(0, 0, 0, 0.2);
            transition: all 0.3s;
            text-align: center;
        }

        .login-card h2 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: #1e293b;
        }

        .login-card p {
            color: #475569;
            margin-bottom: 2rem;
            font-size: 0.9rem;
        }

        .input-group {
            margin-bottom: 1.25rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            color: #0f172a;
        }

        .input-group input {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #cbd5e1;
            border-radius: 14px;
            font-size: 1rem;
            transition: 0.2s;
            background: white;
        }

        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.2);
        }

        button {
            width: 100%;
            background: #3b82f6;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background: #2563eb;
            transform: scale(0.98);
        }

        .extra-links {
            margin-top: 1.5rem;
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        .extra-links a {
            color: #3b82f6;
            text-decoration: none;
        }

        .extra-links a:hover {
            text-decoration: underline;
        }


        @media (max-width: 480px) {
            .login-card {
                padding: 1.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>登录</h2>

        <form method="post" action="{{ url_for('login') }}">
            <div class="input-group">
                <label>账号</label>
                <input name="username" type="text" placeholder="请输入账号" required>
            </div>
            <div class="input-group">
                <label>密码</label>
                <input name="password" type="password" placeholder="请输入密码" required>
            </div>
            <button type="submit">登 录</button>
            <div class="extra-links">
                <a href="{{ url_for('forget_password') }}">忘记密码？</a>
            </div>
        </form>
    </div>
    <script>
        {% for message in get_flashed_messages() %}
            alert({{ message|tojson }});
        {% endfor %}
    </script>
</body>
</html>
